  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161d;
      --border: #1e2330;
      --accent: #c8a84b;
      --accent2: #e05c3a;
      --text: #e8eaf0;
      --muted: #6b7280;
      --card-bg: #161921;
      --card-hover: #1a1e28;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 2rem 2rem;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: -60px; left: -60px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(200,168,75,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    h1 span { color: var(--accent); }

    .header-meta {
      margin-top: 0.75rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .header-links {
      margin-top: 1rem;
      display: flex;
      gap: 1rem;
    }

    .header-links a {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      text-decoration: none;
    }

    .header-links a:hover { text-decoration: underline; }

    .controls {
      padding: 1.25rem 2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(13,15,20,0.95);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 400px;
    }

    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 0.75rem 0.6rem 2.25rem;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    .filter-btns {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.45rem 0.85rem;
      border-radius: 6px;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }

    .stats {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-left: auto;
      white-space: nowrap;
    }

    .stats span { color: var(--accent); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      padding: 1.5rem 2rem;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.15s;
      animation: fadeIn 0.3s ease both;
    }

    .card:hover {
      border-color: var(--accent);
      background: var(--card-hover);
      transform: translateY(-2px);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-img {
      width: 100%;
      aspect-ratio: 9/16;
      max-height: 220px;
      object-fit: cover;
      object-position: top;
      background: var(--surface);
      display: block;
    }

    .card-img-placeholder {
      width: 100%;
      height: 140px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
    }

    .card-body {
      padding: 1rem;
    }

    .card-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-owner {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-desc {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    .card-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.6rem;
    }

    .card-actions {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    .card-action-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      transition: all 0.15s;
    }

    .card-action-btn:hover {
      border-color: var(--accent);
      background: rgba(200,168,75,0.1);
    }

    .gallery-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 0.6rem 0 0.25rem;
    }

    .gallery-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      width: 2rem;
      height: 2rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.15s;
    }

    .gallery-btn:hover { border-color: var(--accent); color: var(--accent); }

    .gallery-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.04em;
      padding: 0.15rem 0.5rem;
      border-radius: 3px;
    }

    .tag-apk { background: rgba(74,188,120,0.12); color: #4abc78; border: 1px solid rgba(74,188,120,0.25); }
    .tag-noapk { background: rgba(224,92,58,0.1); color: var(--accent2); border: 1px solid rgba(224,92,58,0.2); }
    .tag-cam { background: rgba(200,168,75,0.1); color: var(--accent); border: 1px solid rgba(200,168,75,0.2); }
    .tag-loc { background: rgba(100,160,255,0.1); color: #64a0ff; border: 1px solid rgba(100,160,255,0.2); }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      backdrop-filter: blur(4px);
      padding: 2rem;
      overflow-y: auto;
    }

    .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 760px;
      overflow: hidden;
      margin: auto;
    }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
    }

    .modal-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 2rem;
      height: 2rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    .modal-close:hover { border-color: var(--accent2); color: var(--accent2); }

    .modal-body {
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 560px) {
      .modal-body { grid-template-columns: 1fr; }
    }

    .modal-img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      object-fit: cover;
      object-position: top;
    }

    .modal-img-placeholder {
      width: 100%;
      aspect-ratio: 9/16;
      background: var(--card-bg);
      border-radius: 8px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
    }

    .modal-info { display: flex; flex-direction: column; gap: 1rem; }

    .modal-field label {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      display: block;
      margin-bottom: 0.25rem;
    }

    .modal-field p {
      font-size: 0.875rem;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
    }

    .modal-actions {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      font-weight: 500;
    }

    .btn-primary:hover { background: #d4b55a; }

    .btn-secondary {
      background: none;
      border-color: var(--border);
      color: var(--muted);
    }

    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .no-results {
      text-align: center;
      padding: 5rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>

    "description": "Campus Bazaar is a student only marketplace for buying and selling second hand goods on campus. Browse listings posted by fellow students, search by title, description or category, and post your own items with a photo, price and category. Built with Flutter, Firebase Authentication, Cloud Firestore for real time data, and Cloudinary for image hosting. Includes account creation, password reset, and full create, edit and delete of your own listings.",

    "id": "6a114589112a5a5a3901f1f4",
    "name": "Mentora",
    "slug": "broad-billed-prion",
    "description": "Mentora is a marketplace for tutoring. Whether you're a Year 12 student cramming for the HSC, a uni student needing help with calculus, or an adult learner picking up a new language, you can find someone who teaches what you need. And if you're the one with the knowledge, you can post yourself as a tutor for free and get found by the people who need you.",
    "instructions": "There's a test account already set up so you don't need to register:\n\nEmail & Password:\n\nmarker@mentora.app\n\nmarker123\n\n\n\nThis account already has a few sample listings attached, so the home screen won't be empty when you sign in.\n\nYou can also create your own account through the register screen if you want to test the sign-up flow. There's no email verification, so any email works as long as it has an @ in it and the password is 6 characters or more.\n\nRunning the app\n\nThe app has been tested on Chrome and on an Android emulator. Both work, with no extra Firebase setup needed - firebase\\_options.dart is committed and points at the live project.\n\nFrom the project root:\n\nbash\n\nflutter pub get\n\nflutter run -d chrome\n\nFor Android, with an emulator running:\n\nbash\n\nflutter run\n\nOr install the included APK directly:\n\nbuild/app/outputs/flutter-apk/mentora-angus-muma-48230820.apk\n\nDrag the file onto a running emulator, or copy it to a physical Android device and tap to install.\n\nSuggested test flow\n\nA quick walkthrough that covers all the main features in about 5 minutes:\n\nBrowsing\n\n1. Sign in with the test account above\n2. The home screen shows the existing listings\n3. Type \"year 12\" or \"chemistry\" into the search bar - listings filter live\n4. Tap one of the category chips (\"Maths\", \"Sciences\", etc.) to filter by subject\n5. Tap \"All\" to clear the category filter\n6. Tap any listing to see the full detail view\n\nCreating a listing\n\n1. Tap the green \"Add listing\" button in the bottom right\n2. Fill in the form and pick a cover photo from your device\n3. Tap \"Post listing\" - it appears on the home screen instantly via the live Firestore stream\n4. Tap your new listing to open it\n5. The Edit and Delete buttons appear at the bottom because you own it\n6. Tap Edit to change something, or Delete (with confirmation dialog) to remove it\n\nFavourites\n\n1. On any listing card, tap the small bookmark icon in the top-right corner of the image - it fills in\n2. Tap the bookmark icon in the top app bar to open the Saved screen\n3. Tap a listing to view it, then tap the bookmark icon in the detail screen's app bar to unsave\n\nProfile\n\n1. Tap the person icon in the top app bar to open Profile\n2. Tap your avatar circle (or the green camera button) to upload a profile picture\n3. Tap \"Edit\" next to your display name to change it - Save to confirm\n4. The stats section shows your listings count (live) and join date\n\nSigning out\n\n* Use the logout icon in the top app bar on the home screen, or\n* The red \"Sign out\" button at the bottom of the profile screen\n\nEither drops you back to the login screen.\n\nRunning the tests\n\n* There are 21 tests covering the listing model, the filter logic, and several widgets:\n* bash\n* flutter test\n* All should pass.\n\nA note on images\n\nIf you're running on Chrome and listing images don't load, that's a CORS issue on the Firebase Storage bucket. The bucket I'm using already has the right CORS rule applied, so images should display straight away. If you fork this project and connect a different Firebase project, see the README under \"Device compatibility\" for the gsutil cors set command needed.\n\nWhat to look at in the code:\n\nIf you're reviewing the codebase rather than just the running app:\n\n* lib/services/ - AuthService, ListingService, StorageService, UserService. All Firebase calls are wrapped here, so the screens stay clean.\n* lib/utils/listing\\_filters.dart - pure function for the search and category filtering, extracted so it can be unit tested without touching widgets.\n* lib/theme/app\\_theme.dart - centralised colour and typography tokens. Everything visual in the app pulls from here.\n* test/ - 5 test files, mix of unit tests and widget tests.",

    "description": "SnapSwot is a modern study companion app designed for students who learn best through visual revision and organised notes. The app allows users to create study notes using text, screenshots, diagrams, handwritten summaries, coding examples, and multiple uploaded images all within one place. Notes are displayed as clean visual cards with image previews, making revision faster and more engaging compared to traditional text heavy note taking apps.\n\nThe app includes secure login and cloud storage using Firebase, allowing users to access their study material anytime while keeping notes organised and personalised. Users can create, edit, save, and delete notes, upload images directly from their gallery or camera, and bookmark important revision content for quick access during exams or assessments.\n\nSnapSwot was designed with a warm and visually calming interface featuring smooth animations, modern card layouts, and simple navigation to create a more enjoyable study experience. Future versions of the platform aim to introduce collaborative note sharing where students can upload educational content, discover notes by subject or topic, and learn from simplified explanations created by other students.",

    "description": "FiMe is a mobile marketplace app that connects customers with trusted local tradies and service providers across Australia. Users can quickly post jobs for services such as plumbing, electrical work, cleaning, gardening, and home maintenance, while tradies can browse available jobs, accept work opportunities, and communicate directly with customers through in-app messaging.\n\nThe app focuses on creating a safer and more convenient hiring experience by including features such as user profiles, ratings and reviews, job progress tracking, rewards points, notifications, and secure job management. Customers can track their active and completed jobs, while tradies can manage bookings, build their reputation, and grow their business through the platform.\n\nFiMe was designed to provide a modern, easy-to-use solution for connecting local communities with reliable service providers anytime and anywhere.",

    "description": "*Car Logbook* is a simple app for tracking your car trips. Take a photo of your odometer, record where you started and finished, tag the trip as *Work, Personal or Practice*, and end it when you arrive.\u00a0Each trip is stored with your start and end photos so you've got proof at tax time. \n\nThe Logs tab\u00a0groups trips by month and you can filter by purpose. \n\nThe Stats tab gives you km totals, a breakdown\u00a0by trip type and a tax claim estimate using the ATO cents-per-km method. \n\nThere's a CSV export from Settings if you want to hand the lot to your accountant. \n\n*Built for people who do a lot of work-related driving \u2014 disability support workers, sales reps, anyone using the ATO logbook method.*",

    "name": "Clash Base",
    "slug": "pied-monarch",
    "description": "Clash Base\u00a0is a community platform for Clash of Clans players to discover, share, and save base layouts.\n\nFinding a good base usually means going through Reddit threads or YouTube videos. Clash Base cuts straight to it. Browse a live feed of layouts filtered by your Town Hall level, village type, and the game mode your base will be used for (War, CWL, Ranked, Farming, Fun). When you find one you like, tap 'Open in Clash' to launch it directly in the game. \n\nGot a layout worth sharing? Submit it in under a minute: paste the in-game share link (Layout Editor -> Share -> Share As Link), pick a screenshot from your camera roll, add a title and its ready to upload. The app detects your Town Hall level and village type automatically from the link. Optionally include the Clan Castle composition, a description, and personal tags to help other players find exactly what they're looking for.",
    "instructions": "Test Account (pre-seeded with listings)\n\nEmail: reviewer@clashbase.com\n\nPassword: COMP3130\n\nOR \n\nRegister your own account - recommended if you want to test submitting, editing, and deleting without affecting others. \n\nTesting CRUD\n\nCreate \t| Bottom nav \u2192 Submit tab \u2192 paste a CoC share link, pick an image, fill in a title \u2192 submit base button\n\nRead \t| Browse screen (home feed), Base Detail screen, Profile screen\n\nUpdate\t| Open any of your listings \u2192 tap \u22ee \u2192 Edit listing \u2192 update listing\n\nDelete\t| Open any of your listings \u2192 tap \u22ee \u2192 Delete listing \u2192 confirm\n\nTesting the Device Service (image picker)\nSubmit tab \u2192 tap the image placeholder at the top \u2192 photo picker opens from camera roll. Permission is requested at this point.\n\nExample share links for submitting a base\n\n* TH18:\u00a0`https://link.clashofclans.com/en/?action=OpenLayout&id=TH18%3AHV%3AAAAAVwAAAAHd9BhmQsaC9K3BBlopySCq`\n* TH12:\u00a0`https://link.clashofclans.com/en/?action=OpenLayout&id=TH12%3AHV%3AAAAAMQAAAAJKXDhc_SrCDCzqWdG0651D`\n* BH9:\u00a0`https://link.clashofclans.com/en/?action=OpenLayout&id=TH9%3ABB2%3AAAAAMQAAAAJ1Vfo6ZSqND13IZwPWPr-T`\n\nAn example base screenshot is included in\u00a0`example_photo/exampleBase.jpg`\u00a0in the repository, save it to the device camera roll to use as a test image.\n\nKnown Limitation \n\nThe\u00a0*Open in Clash*\u00a0button opens the share link in the device browser. If Clash of Clans is not installed, the browser page will load but the in-game redirect won't fire - this is expected behaviour.\n\nDevice Compatibility\n\nAndroid APK only",

    "name": "Settled",
    "slug": "great-knot",
    "description": "Settled is a recipe, shopping list, and food logging app designed to keep meal planning simple.\n\nUsers can save recipes, organise them into collections, add ingredients and method steps, upload recipe photos, record optional macro information, and reuse saved recipes when planning meals. Recipes can also be added to a shopping list, where ingredients are scaled by serving size and turned into checkable grocery items.\n\nSettled also includes a daily food log for users who want to track calories and macros. Users can log saved recipes or custom meals, tag entries by meal time, and view their daily totals for calories, protein, carbs, fat, fibre, sodium, water, and exercise.\n\nThe app is built for students, gym-goers, home cooks, parents, and busy everyday users who want one simple place for recipes, shopping, and optional macro-aware food tracking.",
    "instructions": "Test account:\n\nEmail: marker@settled.app\n\nPassword: Marker123!\n\n\n\nThis account is connected to the live Firebase project. On first sign-in, the app automatically writes 10 starter recipes across the default collections so the app is not empty.\n\n\n\nSuggested review flow:\n\n1\\. Sign in with the test account above.\n\n2\\. Open the Recipes tab to view the starter recipes.\n\n3\\. Open a recipe and review the ingredients, method, servings, photo, and macro information.\n\n4\\. Change the servings amount and check that ingredient quantities and macro values update.\n\n5\\. Add the recipe ingredients to the Shopping tab.\n\n6\\. Open the Shopping tab and check/uncheck shopping list items.\n\n7\\. Add a custom shopping item.\n\n8\\. Open the Today tab and log a saved recipe or custom food.\n\n9\\. Confirm that the daily calorie and macro totals update.\n\n10\\. Edit or delete a meal log entry.\n\n11\\. Open Settings to view account options and sign out.\n\n\n\nTo test recipe creation:\n\n1\\. Go to the Recipes tab.\n\n2\\. Tap the add/new recipe button.\n\n3\\. Enter a recipe name, ingredients, method, servings, prep/cook times, and optional macro information.\n\n4\\. Choose a recipe photo using the device.\n\n5\\. Save the recipe.\n\n6\\. Confirm that the recipe appears in the recipe library and can be opened, edited (add it to a collection via this if you want), or deleted.\n\n\n\nRunning from source:\n\nflutter pub get\n\nflutter run\n\n\n\nFor Chrome:\n\nflutter run -d chrome\n\nRunning tests:\n\nflutter test\n\nThe project includes Firebase configuration for the assignment version. Android is the main target and has been tested on the Android emulator. Chrome is supported, with a minor limitation that newly picked local image files may not display during the brief window before Firebase Storage returns the final download URL. iOS is configured but was not built or tested because building for iOS requires a Mac.",

    "name": "payday",
    "slug": "frasers-dolphin",
    "description": "PayDay is a mobile budgeting app for people who get paid casually or part-time and never quite know what to do with each paycheque. Instead of asking users to link a bank account or split their money manually, PayDay does the budgeting thinking for them: the user sets up the things they need to cover (rent, food, savings, etc.) once, and every time they get paid, the app automatically suggests how to divide that paycheque across those priorities.\n\nThe key idea is that priorities change with every paycheque. A small pay might only stretch to cover rent and food, while a larger one can fund everything including savings. PayDay handles this by funding the most important categories first, so the user always knows what to do with the money they just received. Paycheques are saved over time so the user can look back at how each one was split, and they can attach a photo of a receipt to keep a record of real spending. Nothing in PayDay touches real bank accounts; it is a planning and guidance tool, not a banking app.",

    "id": "6a143f8d112a5a5a390231f8",
    "name": "Ink & Echo",
    "slug": "southwestern-pygmy-possum",
    "description": "Ink & Echo\u00a0is a private reading journal for people who want to remember how a book felt\u2014not only that they finished it.\n\nAfter you sign in, you build a personal\u00a0Vault\u00a0of book entries stored securely in the cloud. Each entry can include a title and author, a written reflection or favourite quote (\u201cecho\u201d), an optional mood, a cover photo, and a voice note converted to text on your device. The app is designed for one reader at a time: your library is private to your account, with no social feed or sharing with other users.\n\nUse Ink & Echo to capture reading moments with intention\u2014search and sort your vault, revisit entries in a calm, book-inspired layout, and adjust accessibility options such as dark mode, text size, high contrast, and reduced motion.",
    "instructions": "How to run the app\n\n1. Install Flutter and open the project.\n2. Run\u00a0`flutter pub get`, then\u00a0`flutter run`\u00a0on an Android emulator or physical device (iOS/Android are the primary targets).\n3. Ensure Firebase\u00a0Authentication\u00a0(Email/Password; Google optional) and\u00a0Cloud Firestore\u00a0are enabled for the project configured in\u00a0`lib/firebase_options.dart`.\n\nTest account (email sign-in)\n\nEmail\n\n`test@gmail.com`\n\nPassword\n\n`Test1234`\n\nCreate this user in Firebase Console \u2192 Authentication before marking if it does not already exist. Alternatively, use\u00a0Sign up\u00a0with any valid email and password (6+ characters); each account only sees its own vault.\n\nSuggested review flow\n\n1. Sign in\u00a0with the test account (or Google if configured on the device).\n2. Create\u00a0\u2014 Vault menu or \u201cStart a New Entry\u201d \u2192 add title + author \u2192 optional mood, photo, voice \u2192\u00a0Save book.\n3. Read\u00a0\u2014 entry appears in the Vault; tap for detail (Added\u00a0/\u00a0Last updated\u00a0after edit).\n4. Update\u00a0\u2014\u00a0Edit\u00a0on detail \u2192 change fields \u2192 save.\n5. Delete\u00a0\u2014\u00a0Delete\u00a0on detail \u2192 confirm.\n6. Search & sort\u00a0\u2014 Vault search bar; drawer sort (newest/oldest/title).\n7. Offline / errors\u00a0\u2014 disable network:\u00a0Offline\u00a0chip in the app bar; pull-to-refresh on Vault; retry snackbars on failed save/delete.\n8. Settings\u00a0\u2014 accessibility toggles;\u00a0Sign out\u00a0(confirmation dialog).\n9. Tests\u00a0\u2014\u00a0`flutter test`\u00a0(109 tests, all should pass).\n\nOptional demo data\n\nflutter run --target tool/seed\\_sample\\_entries.dart\n\n(Sign in as the test user first; see\u00a0`docs/sample_vault_entries.md`.)\n\nGoogle Sign-In:\u00a0optional; use email/password if Google is unavailable in the marking environment (see README for SHA-1 /\u00a0`google-services.json`).\n\nContact:\u00a0Minh Vy Ha - 48485837 -\u00a0minhvy.ha@students.mq.edu.au",

    "slug": "black-shouldered-kite",
    "description": "MQ Navigation                                                                                                                                        \n\nFind your way around Macquarie \u2014 without selling your data.                                                                                       \n\n                                                                                                                                                        \n\n  \n\n\n\nMQ Navigation is the ultimate campus companion for Macquarie University. Built with privacy at its core, it helps students, staff, and visitors       \n\n  navigate MQ\u2019s 150+ buildings, find safety resources, and check transit schedules without tracking their movement or selling their data.\n\n  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500\n\n  Dual-Renderer Maps\n\n  \n\n  Standard maps stop at the street. MQ Navigation goes right to the classroom door.\n\n  \n\n  \u2022 Illustrated Campus Map: A beautiful, custom illustrated map calibrated for campus pathways. See exactly where Wally's Walk is, locate building      \n\n  entrances, and browse faculties.\n\n  \u2022 Google Maps Integration: Switch instantly to standard satellite and traffic views with marker clustering when you need a broader overview.          \n\n    \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500\n\n Turn-by-Turn Pedestrian Routing\n\n  \n\n  Never get lost between lectures again. Type a building code (like 18WW or 1CC) into the search bar, select your travel mode (walking, driving,        \n\n  cycling, or transit), and get step-by-step routing instructions directly to the entrance.\n\n  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \n\nPrivacy-First Compass Mode\n\n  \n\n  Activate Compass Mode to get a real-time directional radar arrow guiding you directly toward your selected building. Designed with absolute privacy,  \n\n  all heading and bearing calculations are performed on-device\u2014your GPS coordinates and compass orientation never leave your phone.\n\n    \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500\n\nCampus Safety Toolkit\n\n  \n\n  Whether you are walking across campus after dark or in need of assistance, the Safety Toolkit is one tap away:\n\n  \n\n  \u2022 Emergency Hotlines: Direct dial links for Macquarie Campus Security and emergency services.\n\n  \u2022 First Aid & AED Directory: Find the closest defibrillators and first aid rooms immediately, complete with building codes and instructions.          \n\n  \u2022 Flashlight Toggle: Keep your path lit with the built-in device flashlight control.\n\n    \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500\n\nLive Transit Departures\n\n  \n\nCommuting to campus? Save your preferences (metro, train, or bus line) and view real-time countdown boards for Macquarie University Station directly  \n\non your home screen.\n\n  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500\n\nWhy MQ Navigation? (Privacy by Design)\n\n  \n\n  \u2022 Optional Accounts: You don\u2019t need to register to use the app. Accounts are only needed if you want to sync your favourites list across multiple devices.\n\n  \u2022 Zero Tracking: The app contains no third-party analytics, trackers, or crash-reporting libraries.\n\n  \u2022 No Location History: Your GPS location is used ephemerally to centre the map and calculate routes. Your location history is never saved or uploaded.\n\n  \u2022 Accessibility-First: Features high-contrast map themes, reduced-motion controls, screen-reader optimisations, and full translation into 35 languages\n\n  (including RTL support).\n\n \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500",
    "instructions": "Reviewer Quick Start Guide                                                                                                                      \n\n                                                                                                                                                        \n\n Test User Credentials                                                                                                                          \n\n                                                                                                                                                        \n\n  The app is connected to a live Supabase instance with email verification bypassed for easy testing. Use these credentials to test authenticated       \n\n  features (like cloud-synchronized favorites):                                                                                                         \n\n                                                                                                                                                        \n\n  \u2022 Email:  marker@mq-navigation.test                                                                                                                   \n\n  \u2022 Password:  OpenDay2026!                                                                                                                             \n\n                                                                                                                                                        \n\n  \u2502 Note: Registration is also fully functional. Reviewers can create a fresh account from the Sign Up screen, which is immediately authenticated       \n\n  without                                                                                                                                               \n\n  \u2502 email confirmation.                                                                                                                                 \n\n \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500                                                                                                                                               \n\n Step-by-Step Launch Instructions                                                                                                                \n\n                                                                                                                                                        \n\nStep 1: Install Dependencies & Generate Code                                                                                                     \n\n                                                                                                                                                        \n\n  Run the following commands in the project root to fetch dependencies and compile the localization files (supporting 35 languages):                    \n\n                                                                                                                                                        \n\n    flutter pub get && flutter gen-l10n\n\n  \n\nStep 2: Set Up Environment Variables\n\n  \n\n  Copy the pre-configured environment template to create a  .env  file:\n\n  \n\n    cp .env.example .env\n\n  \n\n  The repository comes pre-packaged with working Supabase test project credentials and keys in  .env.example , so no external setup is required for     \n\n  grading.\n\n  \n\n Step 3: Run the Application\n\n  \n\n  Launch the application on an Android Emulator, iOS Simulator, or Chrome:\n\n  \n\n    flutter run --dart-define-from-file=.env\n\n  \n\n  (For physical devices or platforms requiring native API keys, use the provided helper script:  ./scripts/run.sh )\n\n  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500\n\n Features to Verify\n\n  \n\n  1\\. Anonymous Mode:\n\n      \u2022 Bypass login at startup. Verify that searching for buildings, browsing campus food & drink, transit metro countdowns, and safety tools work     \n\n      completely without an account.\n\n  2\\. Authentication Gate:\n\n      \u2022 Try to access the Favourites tab. Verify the app redirects you to the authentication screen. Log in using the test credentials above.            \n\n  3\\. Database CRUD (Favourites):\n\n      \u2022 Go to the Map tab, search for a building (e.g., 18 Wally's Walk /  18WW ), and tap the heart icon (\u2764\ufe0f).\n\n      \u2022 Navigate to the Favourites tab. Verify the building is listed.\n\n      \u2022 Tap the kebab menu next to the building and select Edit Note to update your notes (updates database).\n\n      \u2022 Swipe-to-delete or select Remove from the kebab menu to delete it.\n\n  4\\. Compass Mode & Device Services:\n\n      \u2022 On the Map tab, tap a building and start navigation. Select the compass icon to toggle Compass Mode.\n\n      \u2022 Go to the Safety page. Verify you can toggle the flashlight (uses  torch\\_light  on real devices) and view the interactive defibrillator (AED)   \n\n      directory.\n\n  5\\. Localisation:\n\n      \u2022 Go to Settings > Language and switch to another language (e.g., Arabic or Spanish) to see the entire UI dynamically adapt.\n\n  6\\. Codebase Quality & Tests:\n\n      \u2022 Run the quality gate checks to verify static analysis, formatting, and the 320+ unit/widget tests:\n\n        ./scripts/check.sh --quick\n\n \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500  \u2500\u2500\u2500\u2500\u2500\u2500",

    "id": "6a126b5b112a5a5a3901fd62",
    "name": "PinNotes",
    "slug": "blue-winged-kookaburra",
    "description": "A Flutter app where users write notes that remember where they were created. Each note is tagged with GPS coordinates and a reverse-geocoded place name at the moment it is saved. Notes are stored in Cloud Firestore and sync in real time across sessions.",
    "instructions": "# PinNote\n\nA Flutter app where users write notes that remember where they were created. Each note is tagged with GPS coordinates and a reverse-geocoded place name at the moment it is saved. Notes are stored in Cloud Firestore and sync in real time across sessions.\n\n## Features\n\n* Email/password authentication\u00a0\u2014 sign up, sign in, sign out via Firebase Auth\n* Create notes\u00a0\u2014 title and body, captured with GPS location automatically on save\n* View notes\u00a0\u2014 scrollable list ordered newest-first; tap to open full detail view\n* Edit notes\u00a0\u2014 update title and body from the detail screen\n* Delete notes\u00a0\u2014 confirmation dialog before permanent removal\n* Location tagging\u00a0\u2014 each new note records GPS coordinates and a reverse-geocoded place name (e.g. \"Macquarie Park, NSW\")\n* Real-time sync\u00a0\u2014 Firestore stream keeps the notes list up to date without polling\n\n## Tech Stack\n\nLayerTechnology\n\nFramework\n\nFlutter / Dart SDK\u00a0`^3.11.0`\n\nState management\n\n`provider ^6.1.2`\n\nAuth\n\nFirebase Auth\u00a0`^5.3.1`\u00a0(email/password)\n\nDatabase\n\nCloud Firestore\u00a0`^5.4.3`\n\nLocation\n\n`geolocator ^13.0.2`,\u00a0`geocoding ^3.0.0`\n\nFirebase bootstrap\n\n`firebase_core ^3.15.2`\n\n## Prerequisites\n\n* Flutter SDK\u00a0(3.11.0 or later)\n* Android Studio with an Android emulator configured,\u00a0or\u00a0Google Chrome for web\n* A Firebase project with\u00a0Authentication\u00a0(Email/Password) and\u00a0Firestore\u00a0enabled\n* `firebase_options.dart`\u00a0already present in\u00a0`lib/`\u00a0(the file is committed; no extra FlutterFire setup is needed unless you swap the Firebase project)\n\n## Setup / Installation\n\n\\# 1. Clone the repo\ngit clone \\<repo-url>\ncd final-application-3130/final\\_application\n\n\\# 2. Install dependencies\nflutter pub get\n\n\\# 3. (Skip if firebase\\_options.dart is already in lib/)\n\\#    Only needed if you are connecting a different Firebase project:\ndart pub global activate flutterfire\\_cli\nflutterfire configure\n\n`firebase_options.dart`\u00a0is committed to the repo and already points at the correct Firebase project, so steps 1 and 2 are sufficient for a standard run.\n\n## Running the App\n\nWeb (Chrome)\n\nflutter run -d chrome\n\nAndroid emulator\n\nStart an emulator from Android Studio (or\u00a0`flutter emulators --launch <id>`), then:\n\nflutter run\n\n## Login / Test Account\n\nTo create a new account: tap\u00a0Sign up, enter your email and password (password must be entered twice), then tap\u00a0Create account. After the account is created, press the back button or tap\u00a0Sign in\u00a0at the bottom to return to the login screen and log in.\n\nTo skip account creation, use the test credentials:\n\nFieldValue\n\nEmail\n\n`testing@gmail.com`\n\nPassword\n\n`moey123`\n\n## Location Behaviour\n\n* Web\u00a0\u2014 returns the real device location (e.g. Sydney, NSW).\n* Android emulator\u00a0\u2014 hard-codes Mountain View, California (Google's HQ) as the simulated GPS location. This is the emulator's default behaviour, not a bug.\n\n## Project Structure\n\nlib/\n\u251c\u2500\u2500 main.dart                    # entry point; Firebase init; auth gate\n\u251c\u2500\u2500 firebase\\_options.dart        # generated Firebase config (per platform)\n\u2502\n\u251c\u2500\u2500 models/\n\u2502   \u2514\u2500\u2500 note.dart                # Note data class + Firestore serialisation\n\u2502\n\u251c\u2500\u2500 services/\n\u2502   \u251c\u2500\u2500 auth\\_service.dart        # Firebase Auth wrapper (sign in/up/out)\n\u2502   \u251c\u2500\u2500 firestore\\_service.dart   # Firestore CRUD + real-time stream\n\u2502   \u2514\u2500\u2500 location\\_service.dart    # GPS + reverse geocoding\n\u2502\n\u251c\u2500\u2500 state/\n\u2502   \u2514\u2500\u2500 app\\_state.dart           # ChangeNotifier; coordinates all services\n\u2502\n\u251c\u2500\u2500 screens/\n\u2502   \u251c\u2500\u2500 auth/\n\u2502   \u2502   \u251c\u2500\u2500 login\\_screen.dart\n\u2502   \u2502   \u2514\u2500\u2500 signup\\_screen.dart\n\u2502   \u2514\u2500\u2500 notes/\n\u2502       \u251c\u2500\u2500 notes\\_list\\_screen.dart   # main list; FAB opens editor\n\u2502       \u251c\u2500\u2500 note\\_detail\\_screen.dart  # read-only view; edit/delete actions\n\u2502       \u2514\u2500\u2500 note\\_editor\\_screen.dart  # create and edit form\n\u2502\n\u251c\u2500\u2500 widgets/\n\u2502   \u2514\u2500\u2500 note\\_card.dart           # list-item widget used in NotesListScreen\n\u2502\n\u2514\u2500\u2500 theme/\n    \u2514\u2500\u2500 app\\_theme.dart           # Material 3 colour scheme\n\n\n## Known Issues / Notes\n\n* Emulator GPS\u00a0\u2014 the Android emulator reports Mountain View, California by default. Notes created in the emulator will always show that location unless a mock GPS position is set in the emulator's extended controls.",

    "slug": "crimson-finch",
    "description": "Campus Time Capsule is a Flutter mobile app that allows students to create digital memory capsules linked to their campus experience. Users can sign up or log in securely, create capsules with a title, message, category, unlock date, and optional GPS location, then edit or delete their own capsules.\n\nThe app also includes a public nearby capsule feature. Users can choose whether a capsule is private or public. Private capsules are only visible to the creator, while public capsules with GPS location can be discovered by other logged-in users near that location. Public capsules show the creator name and are read-only for other users.\n\nThe app uses Firebase Authentication for user accounts, Cloud Firestore as a remote database, and Geolocator for device location services.",

    "description": "Primary users: regular organisers\n\nThere are the people who run the same kind of event repeatedly, such as weekly volunteer session, a monthly gathering, seasonal road trips. The organisers of such events would want easy and clean way to post an event, let others discover it, and how many are interested. QuickMeet beats spreadsheet and docs of volunteer timings as it is a cleaner and user friendly UX.\n\nPersona: Alex is 20 years old university student, he is a volunteer program manager at MQ university. He runs weekly events, sessions and some trips to support MQ students. Alex doesn't want to manage spreadsheets as it gets long and hard to read. QuickMeet lets Alex post in 30-60 seconds and check the attendee list a glance.\n\nSecondary users: event browsers\n\nPeople who want to find something to do or want to stay up to date. They might be new students, people exploring the campus community, or regular students who want to see what is on this weekends.\n\nPersona: Sam, 19 years old, first year university student. He just moved to campus dormitory and want to find social events. Sam signs up as a guest to browse, then decide to join when something looks interesting enough.\n\nQuickMeet had an advantage over competitors, like google spreadsheet or facebook etc, becuase it has user friendly UX and requires just an account, no friends or public profile needed. It is light weight by design.",

    "slug": "grey-headed-robin",
    "description": "Material Recorder - UI as clean as your recordings.\n\nMaterial Recorder is an absurdly simple but clean app to record audio files. You have one clear button to record, and your file is saved as soon as you hit \n\nFeatures\n\n* Simple and beautiful Material 3 UI\n* No ads, one purpose\n* Files are uploaded to Firebase Cloud Storage if you are signed in so you don't have to worry about backing up your recordings\n* Users can easily download their files for offline use\n\nTarget Userbase\n\nMaterial recorder is designed for users who prefer simplicity and beauty over feature overload and clunky interfaces. Students in a lecture, interviewers with a user/applicant, or professionals during meetings; all of them would prefer a simple and consistent app for recording, but the current market is filled with low quality offerings cluttered with ads. Material Recorder offers that alternative by giving users a stupidly simple but clean UI, while automatically backing up their files to the cloud; removing the friction of manual file management or the distraction of promotional content.\n\nUsers are instantly presented with the record button as the main focal point of the app and whitespace with no ads. After hitting stop, the recordings are automatically backed up and viewable in a list. This design perfectly captures how apps used to be built; one single purpose, no bloat, and designed for the ease of use for the user.",

    "name": "TrustMee",
    "slug": "ant-mimicking-spider",
    "description": "# TrustMee\n\n\n\n\n\\*\\*Know where your time actually goes.\\*\\*\n\n\n\n\nTrustMee is a personal location-tracking app for Android that quietly records the\n\nplaces you visit during your day and turns them into simple, honest statistics.\n\nInstead of guessing how long you spent at work, the gym, or a friend's place,\n\nTrustMee remembers for you.\n\n\n\n\nIt automatically detects when you arrive at and leave\n\nyour saved locations, then showing you a clear breakdown of your week.\n\n\n\n\nThe goal is self-awareness without the busywork. You save the locations that\n\nmatter to you, give them names, and TrustMee does the rest in the background. No\n\nmanual check-ins, no fiddly timers. Just open the app to see where you've been\n\ntoday and how your time stacks up over the week.",
    "instructions": "Very simple to use.\n\n# Important note & instructions\n\n### The main feature works\n\nThe as it stands does not generate weekly stats and a lot of the cool planned setting function aren't working.\n\nThe main feature works! maybe this should have been the first sentence. Despite all casted doubt i had initially the app actually works. You can sign in and edit saved location.\n\nIf you using an emulator its important you actually spoof your location on the device otherwise what the point of the app.\n\nI actually build this with the intention of actually using it myself. I bounce around various places constantly and loss track of time easily so this *\\_would\\_* actually be useful for me. *\\_If it was fully complete and robust\\_* ... it isn't.\n\nI plan to comeback to this project in the future but for now the main deliverable have been completed! hurray!\n\nInstructions\nCreate account\n--------------\n\nTo create an account please select sign up button then enter an email and password to set.\nDont forget your password because the is no password recovery feature!\n\n## Saving location\n\nYou can tap/ click the location title to save you location. Saved location are persistent and you can only edit their name and not delete them (unless you wipe your account in settings)\n\nWhen ever you enter around 50ms radius to that saved location the app will count a timer and will keep a counter on until you leave.\n\nonce you leave you may tap the location title to save a new location again.\n\n## Viewing past locations\n\nyou can swipe up the bottom glass pane to view previously visited locations. Dont forget to press the refresh button, it wont automatically refresh your location history unless you close and reopen the app so click the refresh button to see the refreshed history.\n\n## Spoofing your location\n\nYou most likely not going to be able to use the app out off the box due to the requirement of actually moving around. SO, google or ask ai how to spoof my location on X device or X browser. then you can actually see the full functionality of this app.\n\n## Typos\n\nYou have probably read lots of typos and grammatical errors. This is my apology, sorry. Hope any of this was legible / understandable",

    "id": "6a16ddab112a5a5a3902654a",
    "name": "ParkMQ",
    "slug": "common-netcasting-spider",
    "description": "# ParkMQ \u2013 Smart Campus Parking Assistant\n\nParkMQ is a smart mobile application designed to help university students quickly find and report parking availability around campus. Instead of driving around searching for empty parking spots, users can view real-time parking updates shared by other students and contribute their own reports to help the community.\n\nThe app focuses on improving convenience, reducing parking frustration, and saving time during busy university hours.\n\n## Key Features\n\n* User account registration and login using Firebase Authentication\n* Real-time parking reports stored in Firebase Firestore\n* Add parking availability updates such as:\n  * Available\n  * Nearly Full\n  * Full\n* Upload parking area photos for visual confirmation\n* Add current GPS location using device location services\n* Search parking zones\n* Filter reports by parking status\n* Save favourite parking reports\n* Edit or delete previously created reports\n* \u201cMy Reports\u201d section for managing user-submitted reports\n* Dashboard overview showing parking statistics and alerts\n* Timestamp tracking for parking updates\n* Modern responsive UI built using Flutter\n\n## Target Users\n\nParkMQ is designed primarily for:\n\n* University students\n* Staff members\n* Campus visitors\n\nThe app is especially useful during peak class hours when parking spaces become limited and difficult to find.\n\n## Technologies Used\n\n* Flutter\n* Dart\n* Firebase Authentication\n* Cloud Firestore\n* Firebase Storage\n* Geolocator\n* Image Picker\n* Google Fonts\n\n## Purpose of the App\n\nThe goal of ParkMQ is to create a collaborative parking assistance platform where students can help each other by sharing live parking conditions across campus. The app aims to:\n\n* Reduce time wasted searching for parking\n* Reduce traffic congestion within campus areas\n* Improve the overall student experience\n* Encourage community-driven reporting",
    "instructions": "# Instructions for Reviewers\n\n## Application Name\n\nParkMQ \u2013 Smart Campus Parking Assistant\n\n\n\n# Reviewer Access Instructions\n\n## 1. Launching the Application\n\nRun the following command inside the project directory:\n\n`flutter run -d chrome`\n\nAlternatively, the application can be launched on:\n\n* Android Emulator\n* iOS Simulator\n* Physical Mobile Device\n* Chrome Web Browser\n\n\n\n# Test Account Credentials\n\nReviewers may either:\n\n* Create their own account using the registration page\n* Or use the following sample credentials\n\n## Test Account\n\n`Email: test@parkmq.com`\n`Password: parkmq123`\n\nIf the account does not exist, simply create it using the \u201cCreate Account\u201d button.\n\n\n\n# Features to Test\n\n## Authentication\n\n* Create Account\n* Login\n* Logout\n\n\n\n## Parking Reports\n\n* Add a parking report\n* Select parking status:\n  * Available\n  * Nearly Full\n  * Full\n* Add optional notes\n* Upload parking images\n* Add current GPS location\n\n\n\n## Report Management\n\n* Edit reports\n* Delete reports\n* View timestamps\n* Search parking zones\n* Filter by parking status\n\n\n\n## User Features\n\n* Save favourite reports\n* View favourite reports\n* View \u201cMy Reports\u201d section\n\n\n\n## Dashboard\n\n* View parking availability statistics\n* View live parking alerts\n* View latest updates\n\n\n\n# Firebase Services Used\n\nThe application uses Firebase for backend functionality:\n\n* Firebase Authentication\n* Cloud Firestore\n* Firebase Storage\n\n\n\n# Device Features Used\n\nThe application uses the following mobile device services:\n\n* GPS Location Services\n* Camera/Gallery Image Upload\n* Internet Connectivity\n\n\n\n# Notes for Reviewers\n\n* Internet connection is required for Firebase services\n* Uploaded parking reports update in real time\n* Some browser permission prompts may appear for:\n  * Location access\n  * Image upload access\n\nPlease allow these permissions for full functionality.\n\n\n\n# Known Limitations\n\n* Parking availability depends on user-submitted reports\n* GPS accuracy may vary slightly depending on device/browser\n* Firebase free-tier quotas may limit excessive uploads during testing",

    "slug": "adelaide-trapdoor-spider",
    "description": "Campus Cart is a student marketplace for Macquarie University's Wallumattagal Campus. \n\nBrowse, buy, sell, and swap everyday student items such as textbooks, class notes, chargers, reusable cups, lunch vouchers, and study-week services.\n\n\u3164\n\nSign in with your student email to access a live marketplace feed powered by Firebase Authentication and Cloud Firestore. You can filter by category (Textbooks, Food, Electronics, Services, Other), search by keyword, bookmark listings, and open any listing to view its photo, price, condition, seller details, contact email, and campus pickup point. The Contact seller button opens your email app with the seller's address pre-filled.\n\n\u3164\n\nReady to sell? Create a listing by adding a title, description, category, condition, price, and photo from your gallery. For pickup, choose from quick MQ campus spots, use your device GPS, or open the Campus map picker to search and pin locations such as MQ Library, MUSE, Macquarie University Station, Wally's Coffee Cart, the Sport & Aquatic Centre, and Central Courtyard. You can edit or delete your own listings any time from the Mine tab.",
    "instructions": "Test Account\n\nEmail: sein.park@students.mq.edu.au\n\nPassword: CampusCart1!\u3164\n\n\u3164\n\nYou can also register a new account from the first screen.\n\n\u3164\n\nPlatform Compatibility\n\nTested primarily on Android emulator and iPhone simulator. Also checked on Chrome (web). macOS desktop can run the Flutter app for development, but the submitted build is the Android APK.\n\n\u3164\n\nAuthentication\n\n\\- Sign in with the test account above\n\n\\- Enter an incorrect password to see the inline error message\n\n\\- Tap \"Send password reset\" and enter an email address, the app displays a confirmation message if the address is recognised\n\n\\- Sign out via the icon in the top-right of the marketplace screen\n\n\u3164\n\nMarketplace Feed\n\n\\- The feed loads live Firestore listings immediately after sign-in\n\n\\- Use the category chips (All, Textbooks, Food, Electronics, Services, Other) to filter\n\n\\- Type in the search bar to search across title, description, category, and pickup label\n\n\\- Tap the bookmark icon on any card to save or unsave a listing\n\n\u3164\n\nListing Detail\n\n\\- Tap any listing card to open the detail screen\n\n\\- Shows the photo, price, condition, seller name, contact email, and campus pickup point\n\n\\- Tap \"Contact seller\" to open your email app directly with the seller's address pre-filled\n\n\\- Edit and Delete actions appear only for your own listings\n\n\u3164\n\nCreate / Edit / Delete (CRUD)\n\n\\- Tap the + button (bottom-right of the marketplace screen) to open the create form\n\n\\- Fill in title, description, category, condition, and price; all fields are validated\n\n\\- Tap \"Photo\" to select an image from the gallery; the photo previews immediately\n\n\\- Choose a pickup point using quick MQ campus chips, \"Use my location\", or \"Campus map\"\n\n\\- In Campus map, search official MQ locations or tap the map to set a custom campus pin\n\n\\- Submit the listing: it appears live in the feed and in the Mine tab\n\n\\- Open a listing from the Mine tab, tap \"Edit\" to update any field, or \"Delete\" to remove it\n\n\u3164\n\nSaved and Mine Tabs\n\n\\- Bottom nav: Market | Saved | Mine\n\n\\- Saved shows only bookmarked listings; Mine shows only your own listings\n\n\\- Both tabs respect the active category filter and search query",

    "id": "6a1549fc112a5a5a39023945",
    "name": "Learn n' Locate",
    "slug": "juan-fernandez-petrel",
    "description": "\"A good study place matters\". A productivity app where students log and rate study places.\u00a0\n\n\n\n\"Learn n' Locate\" is a mobile application produced through Flutter that aids students in discovering, sharing, and managing productive study locations nearby. The app enables users to explore study-friendly environments such as libraries, caf\u00e9s, parks, and quiet public spaces through an interactive map-based interface. Users can upload new study spots with photos, descriptions, and overall ratings for the location, helping other students find suitable places to study based on their personal preferences such as WiFi quality, quietness, and comfort.\n\n\n\nThe application is designed to combine location services, cloud-based data storage, and user-generated content into a simple but practical productivity tool. Using Firebase Authentication and Firestore, \"Learn n' Locate\" securely stores user accounts and study spot information while supporting full CRUD operations. The app also integrates mobile device services such as GPS location and camera/photo uploads, enabling users to contribute authentic and location-aware recommendations. Overall, \"Learn n' Locate\" aims to improve students\u2019 study experiences by creating a collaborative platform for discovering effective and reliable study environments.\n\n\n\n\n\"Learn n' Locate\" provides a range of practical features designed to help students locate and share high-quality study environments. The app includes secure user authentication using Firebase Authentication, allowing users to create accounts, log in securely, and manage their own uploaded content. Once logged in, users are presented with an interactive map interface displaying nearby study locations using GPS and real-time location services.\n\n\n\nUsers can create new study spot entries by providing a location name, description, and overall ratings for the location, as well as uploading photos using their mobile device camera or gallery. Each study spot is stored in Firebase Firestore and linked to the user who created it. Users can also perform full CRUD operations by viewing, editing, updating, or deleting their own study spot submissions.\n\n\n\nThe application supports search and filtering functionality, enabling users to quickly locate study spots that match specific preferences such as high overall ratings and locations that are close to the users' current location. Additional interface features include map pins, list views, image previews, and profile management screens. \"Learn n' Locate\" is designed with a clean and user-friendly interface to encourage accessibility and ease of use. By combining cloud storage, location-based services, and user-generated recommendations, the app provides a practical solution for students searching for productive and reliable places to study.\n\n\n\n\n\nThe primary users of \"Learn n' Locate\" are university students, college students, and other learners who regularly search for productive study environments outside their homes. Many students struggle to find locations that provide reliable WiFi, minimal noise, comfortable seating, and a suitable atmosphere for focused work. \"Learn n' Locate\" aims to solve this problem by allowing students to discover and share recommended study spaces within their local area.\n\nUsers interact with the app by browsing map-based study spot listings, searching for locations using filters, and contributing their own recommendations. Unlike generic review platforms such as Google Maps or Yelp, \"Learn n' Locate\" focuses specifically on student productivity needs rather than general business reviews. This specialised focus allows the application to provide more relevant and community-driven information tailored to studying and academic work.",

    let filter = 'all';
    let query = '';

    function filtered() {
      return APPS.filter(app => {
        const matchFilter = filter === 'all' || (filter === 'apk' && app.hasApk) || (filter === 'no-apk' && !app.hasApk);
        const q = query.toLowerCase();
        const matchQuery = !q || app.name.toLowerCase().includes(q) || app.owner.toLowerCase().includes(q) || app.email.toLowerCase().includes(q);
        return matchFilter && matchQuery;
      });
    }

    function cleanText(str) {
      return (str || '').replace(/\*\*/g, '').replace(/#+\s/g, '').replace(/\n/g, ' ').trim();
    }

    function render() {
      const results = filtered();
      const grid = document.getElementById('grid');
      const noResults = document.getElementById('no-results');
      document.getElementById('count').textContent = results.length;

      if (results.length === 0) {
        grid.innerHTML = '';
        noResults.style.display = 'block';
        return;
      }

      noResults.style.display = 'none';
      grid.innerHTML = results.map((app, i) => {
        const img = app.screenshots && app.screenshots.length
          ? `<img class="card-img" src="${app.screenshots[0]}" alt="${app.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class='card-img-placeholder'>no screenshot</div>'">`
          : `<div class="card-img-placeholder">no screenshot</div>`;
        const tags = [
          app.hasApk ? `<span class="tag tag-apk">APK</span>` : `<span class="tag tag-noapk">NO APK</span>`,
          app.usesCamera ? `<span class="tag tag-cam">📷 camera</span>` : '',
          app.usesLocation ? `<span class="tag tag-loc">📍 location</span>` : '',
        ].filter(Boolean).join('');
        const cardActions = [
          `<a class="card-action-btn" href="http://3.104.146.108/app/${app.id}" target="_blank" onclick="event.stopPropagation()">Listing ↗</a>`,
          app.hasApk ? `<a class="card-action-btn" href="comp3130-apks/${app.slug}.apk" download onclick="event.stopPropagation()">⬇ APK</a>` : '',
          app.repo ? `<a class="card-action-btn" href="${app.repo}" target="_blank" onclick="event.stopPropagation()">GitHub ↗</a>` : '',
        ].filter(Boolean).join('');
        return `
          <div class="card" style="animation-delay:${i*0.03}s" onclick="openModal(${JSON.stringify(app).replace(/"/g, '&quot;')})">
            ${img}
            <div class="card-body">
              <div class="card-name">${app.name || '—'}</div>
              <div class="card-owner">${app.owner}</div>
              <div class="card-desc">${cleanText(app.description) || 'No description.'}</div>
              <div class="card-tags">${tags}</div>
              <div class="card-actions">${cardActions}</div>
            </div>
          </div>`;
      }).join('');
    }

    function openModal(app) {
      document.getElementById('modal-title').textContent = app.name;

      const imgWrap = document.getElementById('modal-img-wrap');
      if (app.screenshots && app.screenshots.length) {
        const total = app.screenshots.length;
        let current = 0;
        function galleryHTML(idx) {
          return `
            <img class="modal-img" src="${app.screenshots[idx]}" alt="${app.name} screenshot ${idx+1}">
            ${total > 1 ? `
            <div class="gallery-nav">
              <button class="gallery-btn" onclick="(function(){
                current = (current - 1 + ${total}) % ${total};
                document.getElementById('modal-img-wrap').innerHTML = galleryHTML(current);
              })()" ${idx === 0 ? 'style="opacity:0.3"' : ''}>‹</button>
              <span class="gallery-count">${idx+1} / ${total}</span>
              <button class="gallery-btn" onclick="(function(){
                current = (current + 1) % ${total};
                document.getElementById('modal-img-wrap').innerHTML = galleryHTML(current);
              })()" ${idx === total-1 ? 'style="opacity:0.3"' : ''}>›</button>
            </div>` : ''}
          `;
        }
        imgWrap.innerHTML = galleryHTML(0);
        window.galleryHTML = galleryHTML;
        window.current = current;
      } else {
        imgWrap.innerHTML = `<div class="modal-img-placeholder">no screenshot</div>`;
      }

      const info = document.getElementById('modal-info');
      info.innerHTML = `
        <div class="modal-field"><label>Owner</label><p>${app.owner} · ${app.email}</p></div>
        <div class="modal-field"><label>Description</label><p>${cleanText(app.description) || '—'}</p></div>
        ${app.instructions ? `<div class="modal-field"><label>Test Instructions</label><p>${cleanText(app.instructions)}</p></div>` : ''}
        <div class="modal-field"><label>Data &amp; Permissions</label><p>${[
          app.collectsPersonalInfo ? '👤 Collects personal info' : '',
          app.usesCamera ? '📷 Uses camera' : '',
          app.usesLocation ? '📍 Uses location' : '',
        ].filter(Boolean).join(' · ') || 'None declared'}</p></div>
        <div class="modal-field"><label>Screenshots</label><p>${app.imageCount} uploaded</p></div>
      `;

      const actions = document.getElementById('modal-actions');
      actions.innerHTML = `
        <a class="btn btn-secondary" href="http://3.104.146.108/app/${app.id}" target="_blank">Listing ↗</a>
        ${app.hasApk ? `<a class="btn btn-secondary" href="comp3130-apks/${app.slug}.apk" download>⬇ Download APK</a>` : ''}
        ${app.repo ? `<a class="btn btn-secondary" href="${app.repo}" target="_blank">GitHub ↗</a>` : ''}
      `;

      document.getElementById('modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    document.getElementById('search').addEventListener('input', e => {
      query = e.target.value;
      render();
    });

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filter = btn.dataset.filter;
        render();
      });
    });

    render();
  </script>
